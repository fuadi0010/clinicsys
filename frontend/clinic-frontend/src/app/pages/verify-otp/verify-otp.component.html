  <div class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-blue-50 via-white to-sky-50">
    <div class="w-full max-w-md">
      <!-- Logo -->
      <div class="text-center mb-8">
        <a routerLink="/" class="inline-flex items-center gap-2.5">
          <div class="bg-blue-600 text-white p-2.5 rounded-xl shadow-lg shadow-blue-500/30">
            <i class="bi bi-shield-plus text-2xl"></i>
          </div>
          <span class="font-extrabold text-xl text-slate-900 tracking-tight">CLINIC<span class="text-blue-600">SYS</span></span>
        </a>
      </div>

      <!-- Card -->
      <div class="bg-white border border-slate-100 rounded-card-lg shadow-premium p-8 space-y-6">
        <div class="text-center space-y-2">
          <div class="w-16 h-16 bg-blue-50 text-blue-600 flex items-center justify-center rounded-2xl mx-auto">
            <i class="bi bi-shield-check text-3xl"></i>
          </div>
          <h2 class="text-2xl font-extrabold text-slate-900">Verifikasi Email</h2>
          <p class="text-sm text-slate-500">Kami telah mengirimkan kode OTP ke email Anda. Silakan masukkan kode untuk memverifikasi akun.</p>
        </div>

        <form [formGroup]="otpForm" (ngSubmit)="onSubmit()" class="space-y-5">
          <div>
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Email</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><i class="bi bi-envelope"></i></span>
              <input formControlName="email" type="email" 
                     class="w-full pl-11 pr-4 py-3.5 border border-slate-200 rounded-input text-sm focus:ring-4 focus:ring-blue-100 focus:border-blue-600 transition-all placeholder:text-slate-400"
                     [class.bg-slate-50]="isEmailReadOnly" 
                     [class.text-slate-500]="isEmailReadOnly" 
                     [class.cursor-not-allowed]="isEmailReadOnly" 
                     [class.border-red-300]="otpForm.get('email')?.invalid && otpForm.get('email')?.touched"
                     [readonly]="isEmailReadOnly"
                     placeholder="Masukkan email terdaftar">
            </div>
            <p *ngIf="otpForm.get('email')?.invalid && otpForm.get('email')?.touched" class="text-xs text-red-500 mt-1.5">Email wajib diisi dan valid</p>
          </div>

          <div>
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Kode OTP</label>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><i class="bi bi-key"></i></span>
              <input formControlName="otp" type="text" maxlength="6" class="w-full pl-11 pr-4 py-3.5 bg-white border border-slate-200 rounded-input text-sm text-center tracking-[0.5em] font-bold text-lg focus:ring-4 focus:ring-blue-100 focus:border-blue-600 transition-all" placeholder="000000" [class.border-red-300]="otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched">
            </div>
            <p *ngIf="otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched" class="text-xs text-red-500 mt-1.5">Kode OTP wajib diisi</p>
          </div>

          <button type="submit" [disabled]="loading" class="w-full py-3.5 bg-blue-600 text-white font-bold rounded-button shadow-md shadow-blue-600/20 hover:bg-blue-700 hover:scale-[1.01] active:scale-[0.99] transition-all disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
            <span *ngIf="loading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
            <span>{{ loading ? 'Memverifikasi...' : 'Verifikasi Akun' }}</span>
          </button>
        </form>

        <div class="text-center space-y-3 pt-2 border-t border-slate-100">
          <p class="text-xs text-slate-500">Tidak menerima kode?</p>
          <button (click)="resendOtp()" type="button" class="text-sm text-blue-600 font-bold hover:underline">
            Kirim Ulang OTP
          </button>
        </div>
      </div>

      <p class="text-center text-sm text-slate-500 mt-6">
        <a routerLink="/login" class="text-blue-600 font-bold hover:underline">
          <i class="bi bi-arrow-left mr-1"></i> Kembali ke Login
        </a>
      </p>
    </div>
  </div>
