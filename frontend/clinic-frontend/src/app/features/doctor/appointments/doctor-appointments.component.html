<app-dashboard-layout title="Janji Temu Pasien">
  <!-- Tabs -->
  <div class="flex gap-1 bg-slate-100 p-1 rounded-xl mb-8 w-fit overflow-x-auto">
    <button *ngFor="let tab of tabs" (click)="activeTab = tab.key; filterAppointments()" class="px-5 py-2.5 text-sm font-bold rounded-lg whitespace-nowrap transition-all" [class.bg-white]="activeTab === tab.key" [class.text-slate-900]="activeTab === tab.key" [class.text-slate-500]="activeTab !== tab.key" [class.shadow-sm]="activeTab === tab.key">
      {{ tab.label }}
    </button>
  </div>

  <app-skeleton *ngIf="loading" [rows]="3" />

  <app-empty-state *ngIf="!loading && filteredAppointments.length === 0"
    icon="bi-calendar-x"
    title="Tidak Ada Janji Temu"
    message="Belum ada janji temu untuk kategori ini." />

  <!-- Table -->
  <div *ngIf="!loading && filteredAppointments.length > 0" class="bg-white border border-slate-100 rounded-card-lg shadow-card overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-slate-100 bg-slate-50">
            <th class="text-left px-6 py-4 font-bold text-slate-700 text-xs uppercase tracking-wider">#</th>
            <th class="text-left px-6 py-4 font-bold text-slate-700 text-xs uppercase tracking-wider">Tanggal</th>
            <th class="text-left px-6 py-4 font-bold text-slate-700 text-xs uppercase tracking-wider">Waktu</th>
            <th class="text-left px-6 py-4 font-bold text-slate-700 text-xs uppercase tracking-wider">Catatan</th>
            <th class="text-left px-6 py-4 font-bold text-slate-700 text-xs uppercase tracking-wider">Status</th>
            <th class="text-left px-6 py-4 font-bold text-slate-700 text-xs uppercase tracking-wider">Aksi</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let a of filteredAppointments" class="border-b border-slate-50 hover:bg-slate-50/50 transition-all">
            <td class="px-6 py-4 font-medium text-slate-900">{{ a.id }}</td>
            <td class="px-6 py-4 text-slate-600 whitespace-nowrap">{{ a.appointmentDate }}</td>
            <td class="px-6 py-4 text-slate-600">{{ a.appointmentTime }}</td>
            <td class="px-6 py-4 text-slate-500 max-w-[200px] truncate">{{ a.notes || '-' }}</td>
            <td class="px-6 py-4">
              <span class="inline-flex px-3 py-1 text-xs font-bold rounded-full" [class]="statusClass(a.status)">{{ a.status }}</span>
            </td>
            <td class="px-6 py-4">
              <div class="flex gap-2">
                <a *ngIf="a.status === 'PAID' && !a.hasMedicalRecord" [routerLink]="['/doctor/medical-records/create']" [queryParams]="{ appointmentId: a.id }" class="px-3 py-1.5 text-xs font-bold text-white bg-blue-600 rounded-lg hover:bg-blue-700 transition-all flex items-center gap-1">
                  <i class="bi bi-file-earmark-medical"></i> Buat Rekam Medis
                </a>
                <button *ngIf="a.status === 'PAID' && a.hasMedicalRecord" [disabled]="true" class="px-3 py-1.5 text-xs font-bold text-slate-400 bg-slate-100 border border-slate-200 rounded-lg cursor-not-allowed flex items-center gap-1">
                  <i class="bi bi-check2-all text-slate-400"></i> Rekam Medis Selesai
                </button>
                <span *ngIf="a.status === 'COMPLETED'" class="text-xs text-slate-400 font-semibold italic flex items-center gap-1 text-emerald-600"><i class="bi bi-check2-all"></i> Ditangani</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</app-dashboard-layout>
