<app-dashboard-layout title="Rekam Medis">
  <app-empty-state *ngIf="records.length === 0"
    icon="bi-file-earmark-medical"
    title="Belum Ada Rekam Medis"
    message="Rekam medis yang Anda buat akan tampil di sini."
    actionLabel="Buat Rekam Medis"
    actionRoute="/doctor/medical-records/create" />

  <!-- Table -->
  <div *ngIf="records.length > 0" class="bg-white border border-slate-100 rounded-card-lg shadow-card overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-slate-100 bg-slate-50">
            <th class="text-left px-6 py-4 font-bold text-slate-700 text-xs uppercase tracking-wider">#</th>
            <th class="text-left px-6 py-4 font-bold text-slate-700 text-xs uppercase tracking-wider">Tanggal</th>
            <th class="text-left px-6 py-4 font-bold text-slate-700 text-xs uppercase tracking-wider">Pasien ID</th>
            <th class="text-left px-6 py-4 font-bold text-slate-700 text-xs uppercase tracking-wider">Keluhan</th>
            <th class="text-left px-6 py-4 font-bold text-slate-700 text-xs uppercase tracking-wider">Diagnosis</th>
            <th class="text-left px-6 py-4 font-bold text-slate-700 text-xs uppercase tracking-wider">Tindakan</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of records" class="border-b border-slate-50 hover:bg-slate-50/50 transition-all">
            <td class="px-6 py-4 font-medium text-slate-900">{{ r.id }}</td>
            <td class="px-6 py-4 text-slate-600 whitespace-nowrap">{{ r.examinationDate }}</td>
            <td class="px-6 py-4 text-slate-600">{{ r.patientId }}</td>
            <td class="px-6 py-4 text-slate-600 max-w-[180px] truncate">{{ r.complaint }}</td>
            <td class="px-6 py-4">
              <span class="inline-flex px-3 py-1 bg-red-50 text-red-600 text-xs font-bold rounded-full">{{ r.diagnosis }}</span>
            </td>
            <td class="px-6 py-4 text-slate-600 max-w-[180px] truncate">{{ r.treatment || '-' }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</app-dashboard-layout>
